# =====================================================================
# Reverse proxy TLS para Fontis Remote (rustdesk-api + websockets)
# Usa el certificado wildcard *.fontisberatung.ch (Sectigo OV)
# =====================================================================
# Preparación del certificado en el servidor:
#   1. fullchain: concatenar el cert + la cadena intermedia:
#        cat STAR.fontisberatung.ch.crt STAR.fontisberatung.ch.ca-bundle \
#            > /etc/nginx/ssl/STAR.fontisberatung.ch.fullchain.crt
#   2. La CLAVE PRIVADA (.key) no está en la carpeta descargada de Sectigo:
#      está donde se generó el CSR (normalmente el propio servidor/hosting).
#
# Con esto: consola https://rustdesk.fontisberatung.ch/_admin/
#           cliente web https://rustdesk.fontisberatung.ch/webclient/
#           API embebida en el cliente: https://rustdesk.fontisberatung.ch

server {
    listen 80;
    server_name rustdesk.fontisberatung.ch;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rustdesk.fontisberatung.ch;

    ssl_certificate     /etc/nginx/ssl/STAR.fontisberatung.ch.fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/STAR.fontisberatung.ch.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # WebSocket del ID server (para clientes web) -> wss://.../ws/id
    location /ws/id {
        proxy_pass http://127.0.0.1:21118;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # WebSocket del relay (para clientes web) -> wss://.../ws/relay
    location /ws/relay {
        proxy_pass http://127.0.0.1:21119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # rustdesk-api: API de clientes + consola /_admin/ + cliente web /webclient/
    location / {
        proxy_pass http://127.0.0.1:21114;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 64m;
    }
}
