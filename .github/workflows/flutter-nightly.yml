name: Flutter Nightly Build

on:
  # Fontis: cron nocturno desactivado para no consumir minutos de Actions.
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    # Fontis: permiso explícito para crear el Release aunque el default
    # de la organización sea solo-lectura.
    permissions:
      contents: write
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
